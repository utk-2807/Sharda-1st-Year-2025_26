<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- Internal CSS -->
    <style>
        p{
            color: violet;
        }
        </style>
    <!-- External CSS -->
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <!-- Inline CSS has the highest priority as it is the closest CSS type to the element
    Internal & External depends upon the closeness with that element. The type which is closer to the element, gets the priority-->
    <!--Inline CSS-->
    <h1 style="color: tomato;">Utkarsh Kumar Upadhyay</h1>

    <p style="color: yellow;">Lorem ipsum dolor sit amet consectetur adipisicing elit. Vero, asperiores.</p>

</body>
</html>
