<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .head1{
            color: red;
        }
        .head2{
            color: blue;
        }
        #h1{
            color: green;
        }
        #h2{
            color: chocolate;
        }
    </style>
</head>
<body>
    <!-- 3 types of selectors:-
    Class, ID and Element(tagname)
    ID > CLASS > ELEMENT (Priority Order)-->
    <h1 id="h1" class="head1">Utkarsh Upadhyay</h1>
    <h1 id="h2" class="head2">Utkarsh Upadhyay</h1>
</body>
</html>
