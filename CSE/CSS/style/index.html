<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- Internal CSS -->
    <style>
        p{
            background-color: pink;
            color: white;
        }
    </style>
    <!-- External CSS-->
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <!-- There are 3 types of CSS :-
     Inline, Internal & External-->

    <!-- Inline CSS has the highest Priority-->
    <!-- If we want to check priority between Internal & External CSS, then it will give priority to the one which is closer to that element-->

     <!-- Inline CSS -->
    <h1 style="color: red;">Utkarsh Upadhyay</h1>

    <p>Lorem ipsum dolor sit amet consectetur, adipisicing elit. Natus, culpa adipisci. Eius sit debitis autem necessitatibus quas? Ipsam, iusto aliquid.</p>
</body>
</html>
