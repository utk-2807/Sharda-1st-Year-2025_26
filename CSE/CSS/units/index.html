<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1{
            /* font-size: 3em; */
            /* font-size: 3rem; */
            font-size: 30px;
        }
        .father{
            font-size: 2em;
        }
        html{
            font-size: 2em;
        }
    </style>
</head>
<body>
    <!-- Some types of units in css are:- 
    1. vw/vh => Relative to the parent
    2. em => Relative to the parent
    3. rem => Relative to the root element, and every element's root element is HTML
    4. % => Absolute by size
    5. px => Absolute by size
    -->

    <!-- The default font size of h1 tag is 32px => 2em-->
    <div class="father">
        <h1>Utkarsh Upadhyay</h1>
    </div>
</body>
</html>
