<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <!-- 
    There are 4 types of positions properties in CSS :-
     1. Relative => Relative to the parent
     2. Absolute => Relative to the root element (Webpage)
     3. Fixed => Also relative to the root element. Get fixed where ever we place it
     4. Sticky => Shows both relative and absolute behaviour. 
     -->
     <div class="container">
        <div class="box red"></div>
        <div class="box violet"></div>
        <div class="box green"></div>
        <div class="box blue"></div>
     </div>
</body>
</html>
