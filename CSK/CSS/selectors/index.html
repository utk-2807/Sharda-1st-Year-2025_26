<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .head1{
            color: blue;
        }
        .head2{
            color: red;
        }
        #h1{
            color: aquamarine;
        }
        #h2{
            color: chartreuse;
        }
    </style>
</head>
<body>
    <!-- We have 3 types of selectors in CSS
     ID, Class, Element(Tag)
     ID > Class > Element(Tagname) (ICE) => Prioirity Order
     -->

     <h1 id="h1" class="head1">Utkarsh Upadhyay</h1>
     <h1 id="h2" class="head2">Utkarsh Upadhyay</h1>
    
</body>
</html>
