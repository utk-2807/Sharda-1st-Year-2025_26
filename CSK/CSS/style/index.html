<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!--External CSS-->
    <link rel="stylesheet" href="./style.css">
    <!-- Internal CSS -->
    <style>
        p{
            color: violet;  
        }
    </style>
</head>
<body>
    <!-- There are 3 types of CSS that we can use for styling an HTML File:-
     Inline, Internal & External
     Inline CSS has the highest priority
     In comparison of priority in Internal And External, we notice that which CSS type is typed closer to the element-->

    <!-- Inline CSS -->
    <h1 style="color: teal;">Utkarsh Kumar Upadhyay</h1>

    <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Ducimus, vero.</p>
</body>
</html>
