<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .head1{
            color: red;
        }
        #h1{
            color: violet;
        }
        .head2{
            color: green;
        }
        #h2{
            color: turquoise;
        }
    </style>
</head>
<body>
    <!-- We have 3 types of selectors:-
     Class, ID and Element-->

    <!-- ID>Class>Element -->
    <h1 class="head1" id="h1">Utkarsh Kumar Upadhyay</h1>
    <h1 class="head2" id="h2">Utkarsh Upadhyay</h1>
</body>
</html>
