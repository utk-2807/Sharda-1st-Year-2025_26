    <!-- There are 4 types of position property in CSS -
     1) Relative -> Relative to the parent
     2) Absolute -> relative to the html
     3) Fixed -> Relative to the HTML (To FIX an element on the webpage)
     4) Sticky -> Relative to the parent (it also shows some fixed behaviour) -->

     <div class="boxes">
        <div class="box red"></div>
